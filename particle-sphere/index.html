<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gesture Particle Morph</title>
  <style>
    * { box-sizing: border-box; }
    :root { color-scheme: dark; font-family: Inter, "Segoe UI", system-ui, sans-serif; }
    body {
      margin: 0; overflow: hidden; color: #fff;
      background:
        radial-gradient(circle at 50% 50%, rgba(50, 70, 210, .22), transparent 42%),
        radial-gradient(circle at 18% 20%, rgba(0, 245, 255, .12), transparent 32%),
        radial-gradient(circle at 82% 78%, rgba(178, 72, 255, .1), transparent 30%),
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px),
        #03040a;
      background-size: auto, auto, auto, 48px 48px, 48px 48px, auto;
    }
    #scene { position: fixed; inset: 0; width: 100%; height: 100%; }
    .intro { position: fixed; top: 24px; left: 26px; pointer-events: none; }
    .intro p {
      margin: 0 0 7px; color: #8ca4ff; font-size: 11px;
      font-weight: 700; letter-spacing: .22em; text-transform: uppercase;
    }
    .intro h1 { margin: 0; font-size: clamp(24px, 3.2vw, 42px); letter-spacing: -.06em; }
    .intro span { display: block; margin-top: 8px; color: rgba(255,255,255,.5); font-size: 12px; }
    .camera-wrap {
      position: fixed; right: 22px; top: 22px; width: min(250px, 30vw); aspect-ratio: 4 / 3;
      overflow: hidden; border: 1px solid rgba(255,255,255,.13); border-radius: 18px;
      background: rgba(8,10,20,.76); box-shadow: 0 20px 60px rgba(0,0,0,.45);
    }
    video { width: 100%; height: 100%; object-fit: cover; opacity: .5; transform: scaleX(-1); }
    #handOverlay { position: absolute; inset: 0; width: 100%; height: 100%; }
    .status {
      position: absolute; left: 10px; bottom: 10px; padding: 5px 8px; border-radius: 20px;
      background: rgba(0,0,0,.5); color: rgba(255,255,255,.82); font-size: 10px; letter-spacing: .08em;
    }
    button {
      position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
      padding: 12px 20px; border: 1px solid rgba(126,157,255,.45); border-radius: 99px;
      background: rgba(73,98,190,.22); backdrop-filter: blur(14px); color: #e5eaff; cursor: pointer;
      box-shadow: 0 10px 35px rgba(0,0,0,.35);
    }
    button:hover { background: rgba(73,98,190,.38); }
    button:disabled { cursor: wait; opacity: .75; }
    .meter {
      position: fixed; left: 26px; bottom: 28px; width: 150px; height: 3px;
      overflow: hidden; border-radius: 4px; background: rgba(255,255,255,.1);
    }
    .meter div { width: 50%; height: 100%; background: #8ca4ff; transition: width .08s linear; }
    .version {
      position: fixed; right: 22px; bottom: 22px; color: rgba(255,255,255,.42);
      font-size: 11px; letter-spacing: .08em; pointer-events: none;
    }
    @media (max-width: 650px) {
      .camera-wrap { width: 145px; right: 12px; top: 12px; }
      .intro { left: 16px; top: 18px; }
      .meter { left: 16px; bottom: 20px; }
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <section class="intro">
    <p>Hand Tracking Experience</p>
    <h1>手势变形粒子秀</h1>
    <span>1指爱心 · 2指方体 · 3指爆炸 · 4指科技几何体 · 5指照片</span>
  </section>
  <div class="camera-wrap">
    <video id="camera" playsinline muted></video>
    <canvas id="handOverlay"></canvas>
    <div class="status" id="status">CAMERA OFF</div>
  </div>
  <div class="meter"><div id="meterFill"></div></div>
  <div class="version">GESTURE MORPH v5 · 2026-06-05</div>
  <button id="cameraButton">开启摄像头与手势识别</button>

  <script type="module">
    import { FilesetResolver, HandLandmarker }
      from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest";

    const canvas = document.querySelector("#scene");
    const ctx = canvas.getContext("2d");
    const video = document.querySelector("#camera");
    const overlay = document.querySelector("#handOverlay");
    const octx = overlay.getContext("2d");
    const status = document.querySelector("#status");
    const button = document.querySelector("#cameraButton");
    const meterFill = document.querySelector("#meterFill");

    const PARTICLE_COUNT = 4200;
    const BASE_RADIUS = 400;
    const MODE_LABELS = ["WAVE SPHERE", "HEART", "CUBE", "NEBULA BURST", "TECH GEOMETRY", "PHOTO"];
    let width = innerWidth;
    let height = innerHeight;
    let dpr = 1;
    let handLandmarker;
    let lastVideoTime = -1;
    let depthBase = 0;
    let photoReady = false;
    let photoPoints = [];

    const sphere = {
      x: innerWidth / 2, y: innerHeight / 2, radius: BASE_RADIUS,
      targetX: innerWidth / 2, targetY: innerHeight / 2, targetRadius: BASE_RADIUS,
      spread: 0, targetSpread: 0,
      turn: 0, targetTurn: 0,
      depth: 0, targetDepth: 0,
      spin: 0,
      mode: 0, targetMode: 0, morph: 1
    };

    const particles = Array.from({ length: PARTICLE_COUNT }, (_, index) => {
      const phi = Math.acos(1 - 2 * (index + .5) / PARTICLE_COUNT);
      const theta = Math.PI * (1 + Math.sqrt(5)) * index;
      return {
        index, theta, phi,
        ox: Math.sin(phi) * Math.cos(theta),
        oy: Math.cos(phi),
        oz: Math.sin(phi) * Math.sin(theta),
        layer: index % 3 === 0 ? 0 : 1,
        wobble: Math.random() * Math.PI * 2,
        size: Math.random() * 1.05 + .32,
        spreadX: Math.random(),
        spreadY: Math.random(),
        blastAngle: Math.random() * Math.PI * 2,
        blastPower: .18 + Math.pow(Math.random(), .68) * 1.75,
        nebulaBand: Math.random(),
        photo: { x: 0, y: 0, z: 0, color: [120, 220, 255] },
        driftX: Math.random() * 2 - 1,
        driftY: Math.random() * 2 - 1
      };
    });

    const distance = (a, b) => Math.hypot(a.x - b.x, a.y - b.y, (a.z || 0) - (b.z || 0));
    const clamp = value => Math.max(-1, Math.min(1, value));
    const clamp01 = value => Math.max(0, Math.min(1, value));
    const smoothstep = (from, to, value) => {
      const t = clamp01((value - from) / (to - from));
      return t * t * (3 - 2 * t);
    };

    function resize() {
      width = innerWidth; height = innerHeight; dpr = Math.min(devicePixelRatio || 1, 2);
      canvas.width = width * dpr; canvas.height = height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      overlay.width = overlay.clientWidth * dpr; overlay.height = overlay.clientHeight * dpr;
      octx.setTransform(dpr, 0, 0, dpr, 0, 0);
      if (!handLandmarker) {
        sphere.x = sphere.targetX = width / 2;
        sphere.y = sphere.targetY = height / 2;
      }
    }

    async function loadPhotoShape() {
      const img = new Image();
      img.src = "assets/gesture-5-photo.jpg";
      await img.decode();
      const sample = document.createElement("canvas");
      const side = 180;
      sample.width = side;
      sample.height = side;
      const sctx = sample.getContext("2d", { willReadFrequently: true });
      sctx.fillStyle = "#fff";
      sctx.fillRect(0, 0, side, side);
      sctx.drawImage(img, 0, 0, side, side);
      const pixels = sctx.getImageData(0, 0, side, side).data;
      const points = [];
      const gap = 2;
      for (let y = 0; y < side; y += gap) {
        for (let x = 0; x < side; x += gap) {
          const i = (y * side + x) * 4;
          const r = pixels[i], g = pixels[i + 1], b = pixels[i + 2];
          const brightness = (r + g + b) / 3;
          const colorRange = Math.max(r, g, b) - Math.min(r, g, b);
          if (brightness < 246 || colorRange > 18) {
            points.push({
              x: (x / side - .5) * 1.72,
              y: (y / side - .52) * 1.72,
              z: (Math.random() - .5) * .05,
              color: [r, g, b]
            });
          }
        }
      }
      photoPoints = points.length ? points : [{ x: 0, y: 0, z: 0, color: [255, 255, 255] }];
      particles.forEach((p, index) => {
        p.photo = photoPoints[index % photoPoints.length];
      });
      photoReady = true;
    }

    function countFingers(hand) {
      const fingers = [[8, 6], [12, 10], [16, 14], [20, 18]].filter(([tip, pip]) =>
        distance(hand[tip], hand[0]) > distance(hand[pip], hand[0]) * 1.16
      ).length;
      const thumbOpen = distance(hand[4], hand[9]) > distance(hand[3], hand[9]) * 1.18 &&
        distance(hand[4], hand[0]) > distance(hand[3], hand[0]) * 1.06;
      return fingers + (thumbOpen ? 1 : 0);
    }

    function updateHand(time) {
      if (!handLandmarker || video.readyState < 2 || video.currentTime === lastVideoTime) return;
      lastVideoTime = video.currentTime;
      const result = handLandmarker.detectForVideo(video, time);
      const hand = result.landmarks?.[0];
      drawHand(hand);

      if (!hand) {
        status.textContent = "SHOW YOUR HAND";
        sphere.targetRadius = BASE_RADIUS;
        sphere.targetSpread = 0;
        sphere.targetTurn = 0;
        sphere.targetDepth = 0;
        sphere.targetMode = 0;
        return;
      }

      const palmIds = [0, 5, 9, 13, 17];
      const palm = palmIds.reduce((sum, id) => ({
        x: sum.x + hand[id].x / palmIds.length,
        y: sum.y + hand[id].y / palmIds.length
      }), { x: 0, y: 0 });

      const palmSize = distance(hand[0], hand[9]) || .1;
      if (!depthBase) depthBase = palmSize;
      depthBase += (palmSize - depthBase) * .012;

      const fingerCount = countFingers(hand);
      const targetMode = fingerCount >= 1 && fingerCount <= 5 ? fingerCount : 0;
      const palmRoll = Math.atan2(hand[17].y - hand[5].y, hand[17].x - hand[5].x);
      const depthAmount = clamp((palmSize / depthBase - 1) * 2.6);

      sphere.targetX = (1 - palm.x) * width;
      sphere.targetY = palm.y * height;
      sphere.targetRadius = targetMode === 3 ? BASE_RADIUS + 90 : targetMode === 5 ? 360 : BASE_RADIUS;
      sphere.targetSpread = targetMode === 3 ? 1 : 0;
      sphere.targetMode = targetMode;
      sphere.targetTurn = targetMode === 5 ? 0 : clamp(palmRoll / .75);
      sphere.targetDepth = targetMode === 5 ? 0 : -depthAmount;
      meterFill.style.width = `${Math.min(fingerCount, 5) * 20}%`;
      status.textContent = `${fingerCount} FINGER · ${MODE_LABELS[targetMode]}`;
    }

    function drawHand(hand) {
      const w = overlay.clientWidth;
      const h = overlay.clientHeight;
      octx.clearRect(0, 0, w, h);
      if (!hand) return;
      octx.strokeStyle = "rgba(133,240,255,.65)";
      octx.lineWidth = 1.2;
      for (const { start, end } of HandLandmarker.HAND_CONNECTIONS) {
        octx.beginPath();
        octx.moveTo((1 - hand[start].x) * w, hand[start].y * h);
        octx.lineTo((1 - hand[end].x) * w, hand[end].y * h);
        octx.stroke();
      }
    }

    function shapePoint(p, mode, time) {
      if (mode === 1) {
        const t = p.theta;
        const x = 16 * Math.pow(Math.sin(t), 3) / 18;
        const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) / 18;
        const z = (p.nebulaBand - .5) * .32 + Math.sin(t * 3 + time * .001) * .06;
        return { x, y, z };
      }
      if (mode === 2) {
        const face = p.index % 6;
        const u = ((p.index * 37) % 101) / 50.5 - 1;
        const v = ((p.index * 61) % 101) / 50.5 - 1;
        const coords = [
          [1, u, v], [-1, u, v], [u, 1, v], [u, -1, v], [u, v, 1], [u, v, -1]
        ][face];
        return { x: coords[0] * .72, y: coords[1] * .72, z: coords[2] * .72 };
      }
      if (mode === 4) {
        const bands = 5;
        const band = p.index % bands;
        const a = p.theta + time * (.0006 + band * .00016);
        const r = .36 + band * .095 + Math.sin(p.theta * 8 + time * .002) * .035;
        const y = (band - 2) * .2 + Math.sin(a * 3) * .045;
        return {
          x: Math.cos(a) * r,
          y,
          z: Math.sin(a) * r
        };
      }
      if (mode === 5) {
        return p.photo;
      }
      return { x: p.ox, y: p.oy, z: p.oz };
    }

    function drawSphere(time) {
      sphere.x += (sphere.targetX - sphere.x) * .28;
      sphere.y += (sphere.targetY - sphere.y) * .28;
      sphere.radius += (sphere.targetRadius - sphere.radius) * .32;
      sphere.spread += (sphere.targetSpread - sphere.spread) * .24;
      sphere.turn += (sphere.targetTurn - sphere.turn) * .34;
      sphere.depth += (sphere.targetDepth - sphere.depth) * .28;
      sphere.spin += .004 + sphere.turn * .055;

      if (sphere.mode !== sphere.targetMode) {
        sphere.morph -= .16;
        if (sphere.morph <= 0) {
          sphere.mode = sphere.targetMode;
          sphere.morph = 0;
        }
      } else {
        sphere.morph += (1 - sphere.morph) * .18;
      }
      sphere.morph = clamp01(sphere.morph);

      const depthScale = 1 + sphere.depth * .32;
      const rotation = time * .00025 + sphere.spin;
      const innerRotation = -time * .00055 - sphere.spin * .55;
      const cos = Math.cos(rotation);
      const sin = Math.sin(rotation);
      const innerCos = Math.cos(innerRotation);
      const innerSin = Math.sin(innerRotation);
      const mode = sphere.mode;
      const fixedPhoto = mode === 5;

      const aura = ctx.createRadialGradient(
        sphere.x, sphere.y, sphere.radius * .05,
        sphere.x, sphere.y, sphere.radius * depthScale * (1.25 + sphere.spread * 2.8)
      );
      aura.addColorStop(0, `rgba(80, 245, 255, ${(1 - sphere.spread) * .11})`);
      aura.addColorStop(.35, `rgba(72, 104, 255, ${(1 - sphere.spread) * .055})`);
      aura.addColorStop(.7, `rgba(187, 70, 255, ${sphere.spread * .08})`);
      aura.addColorStop(1, "rgba(0, 0, 0, 0)");
      ctx.fillStyle = aura;
      ctx.beginPath();
      ctx.arc(sphere.x, sphere.y, sphere.radius * depthScale * (1.25 + sphere.spread * 2.8), 0, Math.PI * 2);
      ctx.fill();

      ctx.globalCompositeOperation = "lighter";
      for (const p of particles) {
        const isInner = p.layer === 0;
        const rotationCos = fixedPhoto ? 1 : (isInner ? innerCos : cos);
        const rotationSin = fixedPhoto ? 0 : (isInner ? innerSin : sin);
        const baseX = p.ox * rotationCos - p.oz * rotationSin;
        const baseZ = p.ox * rotationSin + p.oz * rotationCos;
        const baseY = p.oy;
        const target = shapePoint(p, mode, time);
        const shapeX = target.x * rotationCos - target.z * rotationSin;
        const shapeZ = target.x * rotationSin + target.z * rotationCos;
        const shapeY = target.y;
        const mix = mode === 0 || mode === 3 ? 0 : sphere.morph;
        const x = baseX + (shapeX - baseX) * mix;
        const y = baseY + (shapeY - baseY) * mix;
        const z = baseZ + (shapeZ - baseZ) * mix;
        const layerScale = isInner && mode === 0 ? .52 : 1;
        const waveA = Math.sin(time * .0035 + y * 9 + p.wobble);
        const waveB = Math.sin(time * .0025 + x * 7 - z * 5 + p.wobble * .45);
        const wave = (waveA * .72 + waveB * .48) * (1 - sphere.spread);
        const pulse = 1 + wave * (mode === 0 ? (isInner ? .11 : .24) : .08);
        const depth = (z + 1) / 2;
        const perspective = Math.max(.55, 1 + (z * .18 + sphere.depth * .2) * (1 - sphere.spread));
        const sphereX = sphere.x + x * sphere.radius * pulse * layerScale * depthScale * perspective;
        const sphereY = sphere.y + y * sphere.radius * pulse * layerScale * depthScale * perspective;
        const drift = Math.sin(time * .0005 + p.wobble) * (28 + sphere.spread * 180);
        const blastRadius = Math.hypot(width, height) * (1.4 + sphere.depth * .35) * p.blastPower;
        const cloudX = p.spreadX * width;
        const cloudY = p.spreadY * height;
        const explosionAge = sphere.spread;
        const spiral = p.blastAngle + time * (.0004 + p.nebulaBand * .00068) + p.blastPower * 2.4;
        const ribbon = Math.sin(p.nebulaBand * 28 + time * .0022) * Math.hypot(width, height) * .26;
        const blastX = sphere.x + Math.cos(spiral) * blastRadius + Math.cos(spiral + Math.PI / 2) * ribbon;
        const blastY = sphere.y + Math.sin(spiral) * blastRadius * (.55 + p.nebulaBand * .75) +
          Math.sin(spiral + Math.PI / 2) * ribbon;
        const noiseX = Math.sin(time * .0018 + p.wobble * 2.1) * width * .2;
        const noiseY = Math.cos(time * .0016 + p.wobble * 1.7) * height * .2;
        const spreadX = cloudX * .08 + blastX * .92 + p.driftX * drift + noiseX * sphere.spread;
        const spreadY = cloudY * .08 + blastY * .92 + p.driftY * drift + noiseY * sphere.spread;
        const nebulaEase = sphere.spread * sphere.spread * (3 - 2 * sphere.spread);
        const px = sphereX + (spreadX - sphereX) * nebulaEase;
        const py = sphereY + (spreadY - sphereY) * nebulaEase;
        const glow = p.size * (.72 + depth * 1.65 + sphere.spread * 1.9 + sphere.depth * .25) *
          (isInner ? 1.28 : 1) * perspective * (mode === 4 ? 1.4 : 1);

        ctx.beginPath();
        ctx.arc(px, py, glow, 0, Math.PI * 2);
        const nebulaHue = 190 + p.nebulaBand * 95 + Math.sin(time * .001 + p.wobble) * 24;
        if (mode === 3 && sphere.spread > .15) {
          const tail = 16 + explosionAge * 80 * p.blastPower;
          ctx.strokeStyle = `hsla(${nebulaHue + 50}, 100%, 68%, ${.035 + explosionAge * .16})`;
          ctx.lineWidth = Math.max(.35, glow * .42);
          ctx.beginPath();
          ctx.moveTo(px, py);
          ctx.lineTo(px - Math.cos(spiral) * tail, py - Math.sin(spiral) * tail);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(px, py, glow, 0, Math.PI * 2);
        }
        ctx.fillStyle = mode === 5 && photoReady
          ? `rgba(${p.photo.color[0]}, ${p.photo.color[1]}, ${p.photo.color[2]}, ${.48 + depth * .48})`
          : mode === 1
          ? `hsla(${330 + depth * 18}, 100%, ${62 + depth * 28}%, ${.28 + depth * .72})`
          : mode === 2
            ? `hsla(${205 + depth * 60}, 100%, ${55 + depth * 30}%, ${.22 + depth * .7})`
            : mode === 4
              ? `hsla(${170 + p.nebulaBand * 130}, 100%, ${58 + depth * 32}%, ${.26 + depth * .72})`
              : `hsla(${nebulaHue + Math.abs(wave) * 35}, 100%, ${54 + depth * 34}%, ${.2 + depth * .65 + sphere.spread * .12})`;
        ctx.fill();
      }

      const ringAlpha = mode === 3 ? 0 : (1 - sphere.spread) * (.18 + Math.abs(sphere.turn) * .14);
      ctx.strokeStyle = `rgba(108, 224, 255, ${ringAlpha})`;
      ctx.lineWidth = mode === 4 ? 1.5 : 1;
      const ringCount = mode === 4 ? 7 : 4;
      for (let ring = 0; ring < ringCount; ring++) {
        ctx.beginPath();
        ctx.ellipse(
          sphere.x, sphere.y,
          sphere.radius * depthScale * (1.08 + ring * .045),
          sphere.radius * depthScale * (.2 + ring * .03),
          rotation * (2.2 + ring * .3) + sphere.turn * .9 + ring * .28, 0, Math.PI * 2
        );
        ctx.stroke();
      }
      if (mode === 3 && sphere.spread > .08) {
        const shock = sphere.radius * (1.2 + sphere.spread * 2.4);
        ctx.strokeStyle = `rgba(120, 230, 255, ${(1 - Math.abs(sphere.spread - .55)) * .22})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(sphere.x, sphere.y, shock, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.globalCompositeOperation = "source-over";
    }

    function animate(time) {
      ctx.clearRect(0, 0, width, height);
      updateHand(time);
      drawSphere(time);
      requestAnimationFrame(animate);
    }

    async function startCamera() {
      button.disabled = true;
      button.textContent = "正在请求摄像头权限...";
      status.textContent = "CAMERA";
      try {
        video.srcObject = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        await video.play();
        status.textContent = "LOADING MODEL";
        button.textContent = "正在加载手势模型...";

        const vision = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
        );
        handLandmarker = await HandLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
            delegate: "CPU"
          },
          runningMode: "VIDEO",
          numHands: 1,
          minHandDetectionConfidence: .6,
          minTrackingConfidence: .55
        });
        status.textContent = "SHOW YOUR HAND";
        button.textContent = "手势识别已开启";
      } catch (error) {
        console.error(error);
        status.textContent = "CAMERA ERROR";
        button.disabled = false;
        button.textContent = "重试开启摄像头";
      }
    }

    addEventListener("resize", resize);
    button.addEventListener("click", startCamera);
    resize();
    loadPhotoShape().catch(error => console.error("Photo shape failed", error));
    requestAnimationFrame(animate);
  </script>
</body>
</html>
